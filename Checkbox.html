<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="widthial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form>
        
        <label for="name">NAME :</label>
        <input type="text" name="" id="name"><br><br>
        
        <label for="email">E-Mail :</label>
        <input type="email" name="" id=""><br><br>
        
        <label for="password">PASSWORD :</label>
        <input type="password" name="" id=""><br><br>
        
        <label for="skill">Skill :</label><br><br>

        <input type="checkbox" name="Skill" id="html">
        <label for="html">HTML</label><br>
        
        <input type="checkbox" name="skill" id="css">
        <label for="css">CSS</label><br>
        
        <input type="checkbox" name="skill" id="javascript">
        <label for="javascript">JAVASCRIPT</label><br>
        
    <input type="checkbox" name="skill" id="python">
    <label for="python">PYTHON</label><br><br>

    <button type="">Submit</button>
</form>
    
    
</body>
</html>
