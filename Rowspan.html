<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Subject</th>
        </tr>

        <tr>
            <td rowspan="2">Abdul Malik Khan</td>
            <td>HTML</td>
        </tr>

        <tr>
            <td>CSS</td>
        </tr>
        

    </table>
        
</body>
</html>
